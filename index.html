<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POGO GENT</title>
    
    <!-- Google Fonts voor de exacte gaming/tech stijl -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet">

    <!-- Font Awesome voor alle strakke icoontjes (zowel socials als in de knoppen) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- ALGEMENE STYLING --- */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b1326; /* Diepe, donkerblauwe achtergrond */
            color: #ffffff;
            max-width: 550px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        /* --- PROFIEL / LOGO --- */
        .logo {
            width: 180px;
            height: auto;
            margin-bottom: 10px;
        }
        
        h1 {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 38px;
            font-weight: 700;
            margin: 0 0 15px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .subtitle {
            color: #a0aec0;
            font-size: 16px;
            margin: 0 0 30px 0;
            line-height: 1.6;
            padding: 0 20px;
        }

        /* --- SOCIAL MEDIA ICONEN --- */
        .social-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background-color: #1a2438;
            color: #a0aec0;
            border-radius: 50%;
            text-decoration: none;
            font-size: 20px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .social-icon.active {
            border: 2px solid #fbd38d; /* Goud/gele rand voor Discord */
            color: #ffffff;
            background-color: #222f47;
        }

        .social-icon:hover {
            color: #ffffff;
            background-color: #222f47;
            transform: scale(1.05);
        }

        /* --- DE KNOPPEN --- */
        .link-btn {
            display: flex;
            align-items: center;
            background-color: #172033; /* Donkere knoppen uit screenshot */
            color: #ffffff;
            text-decoration: none;
            padding: 18px 24px;
            margin-bottom: 16px;
            border-radius: 14px; /* Subtiel afgeronde hoeken */
            transition: all 0.2s ease-in-out;
            border: 1px solid #23304a;
        }

        .link-btn:hover {
            background-color: #202b45;
            border-color: #31446b;
            transform: translateY(-2px);
        }

        /* Styling voor het Font Awesome icoon aan de linkerkant */
        .btn-icon {
            font-size: 20px;
            margin-right: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            text-align: left;
        }

        /* De gecentreerde tekst op de knop */
        .btn-text {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 18px;
            font-weight: 500;
            flex-grow: 1;
            text-align: center;
        }

        /* Het pijltje naar rechts (>) */
        .btn-arrow {
            color: #4a5568;
            font-size: 16px;
            font-weight: bold;
            margin-left: 10px;
        }

        /* --- THEMAKLEUREN VOOR DE ICOONTJES --- */
        .c-discord { color: #5865F2; }
        .c-campfire { color: #ff6b4a; }
        .c-mystic { color: #3b82f6; }
        .c-valor { color: #ef4444; }
        .c-instinct { color: #eab308; }
        .c-generic { color: #a0aec0; }
    </style>
</head>
<body>

    <!-- Logo (Zorg dat de bestandsnaam klopt met je upload op GitHub) -->
    <img src="pogo-logo.png" alt="POGO GENT" class="logo">
    
    <h1>POGO GENT</h1>
    <p class="subtitle">Kom hier alles te weten over onze bruisende Pokémon GO Community in Gent!</p>

   <!-- Social Media Rijtje (Volledig gratis & werkend) -->
    <div class="social-container">
        <a href="https://discord.gg/5BTyJUY" target="_blank" class="social-icon active"><i class="fab fa-discord"></i></a>
        <a href="https://www.facebook.com/POGOGENT" target="_blank" class="social-icon"><i class="fab fa-facebook-f"></i></a>
        <a href="https://instagram.com/pokemongogent" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
        <a href="https://www.youtube.com/channel/UCxjZv4--XM1Xzv_BsIODmJg" target="_blank" class="social-icon"><i class="fab fa-youtube"></i></a>
        <a href="https://x.com/pogogent" target="_blank" class="social-icon"><i class="fab fa-x-twitter"></i></a>
    </div>
    
<!-- Instagram Feed -->
    <div style="margin-bottom: 30px;">
        <behold-widget feed-id="eGkYz2nkW7lfJ6sxEKEW"></behold-widget>
        <script>
          (() => {
            const d=document,s=d.createElement("script");s.type="module";
            s.src="https://w.behold.so/widget.js";d.head.append(s);
          })();
        </script>
    </div>
    
    <!-- Knoppen Lijst met jouw eigen links en mijn icoontjes -->
    
    <a href="https://discord.gg/5BTyJUY" target="_blank" class="link-btn">
        <i class="fa-brands fa-discord btn-icon c-discord"></i>
        <span class="btn-text">Join us on Discord</span>
        <span class="btn-arrow">&gt;</span>
    </a>

    <a href="https://campfire.onelink.me/eBr8?af_dp=campfire://&af_force_deeplink=true&deep_link_sub1=cj1jbHVicyZjPWMwYTI3ZTgwLTkxMmItNDlmMy1iNzViLTM3OWZjOGZlNjcwOSZpPXRydWU=" target="_blank" class="link-btn">
        <i class="fa-solid fa-fire btn-icon c-campfire"></i>
        <span class="btn-text">Niantic Campfire</span>
        <span class="btn-arrow">&gt;</span>
    </a>

    <a href="https://goo.gl/WqoqNQ" target="_blank" class="link-btn">
        <i class="fa-solid fa-shirt btn-icon c-generic"></i>
        <span class="btn-text">Merchandise</span>
        <span class="btn-arrow">&gt;</span>
    </a>

    <a href="https://www.google.com/maps/d/u/0/edit?mid=1oDKUAdJJvZ_5h6egDEzEwWVRiPIqxZjw&usp=sharing" target="_blank" class="link-btn">
        <i class="fa-solid fa-map-location-dot btn-icon c-mystic"></i>
        <span class="btn-text">Route Raid Hour & Day</span>
        <span class="btn-arrow">&gt;</span>
    </a>

    <a href="https://stockportpogo.co.uk/cdex/leaderboard" target="_blank" class="link-btn">
        <i class="fa-solid fa-trophy btn-icon c-instinct"></i>
        <span class="btn-text">Community DEX (CDEX) - Leaderboard</span>
        <span class="btn-arrow">&gt;</span>
    </a>

    <a href="https://stockportpogo.co.uk/cdl/leaderboard_page" target="_blank" class="link-btn">
        <i class="fa-solid fa-trophy btn-icon c-valor"></i>
        <span class="btn-text">Community Day (CDL) - Leaderboard</span>
        <span class="btn-arrow">&gt;</span>

    <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vQdTzAM79CJAe8nc83RkwIpIbXV-dPu_DIlh1r0ApoNHddkZr57WuFoyoOQPqMs0kE2wtPwQFSuDt2C/pubhtml?gid=82013888&single=true" target="_blank" class="link-btn">
        <i class="fa-solid fa-right-left btn-icon c-mystic"></i>
        <span class="btn-text">Trade Lijsten</span>
        <span class="btn-arrow">&gt;</span>
    </a>

    <a href="https://docs.google.com/spreadsheets/d/1vfvHuPjak0Lwztf_uI2HeUS_RGq34e9L0RIJDszB7q0/htmlview" target="_blank" class="link-btn">
        <i class="fa-solid fa-user-group btn-icon c-instinct"></i>
        <span class="btn-text">Overzicht Friendcodes</span>
        <span class="btn-arrow">&gt;</span>
    </a>

    <a href="https://goo.gl/2os6dV" target="_blank" class="link-btn">
        <i class="fa-solid fa-user-plus btn-icon c-generic"></i>
        <span class="btn-text">Friendcode Toevoegen</span>
        <span class="btn-arrow">&gt;</span>
    </a>

</body>
</html>
